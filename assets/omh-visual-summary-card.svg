<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">OMH visual-summary workflow card</title>
  <desc id="desc">A vertical product card explaining how OMH prepares provider-neutral visual summary prompts and records observed image evidence separately.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.5" stop-color="#eef7f5"/>
      <stop offset="1" stop-color="#f4f0ff"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a6dff"/>
      <stop offset="1" stop-color="#00a38a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#18213a" flood-opacity="0.16"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", "SF Mono", Consolas, monospace; }
      .title { font-size: 78px; font-weight: 800; letter-spacing: 0; fill: #102033; }
      .subtitle { font-size: 34px; font-weight: 650; fill: #2c4058; }
      .eyebrow { font-size: 24px; font-weight: 800; letter-spacing: 2px; fill: #1a6dff; text-transform: uppercase; }
      .label { font-size: 25px; font-weight: 780; fill: #102033; }
      .body { font-size: 28px; font-weight: 560; fill: #33475f; }
      .small { font-size: 23px; font-weight: 620; fill: #50627a; }
      .code { font-size: 25px; font-weight: 720; fill: #1554c0; }
      .white { fill: #ffffff; }
      .muted { fill: #6b7b91; }
      .card { fill: rgba(255,255,255,0.92); stroke: rgba(40,62,92,0.12); stroke-width: 2; }
      .pill { fill: rgba(26,109,255,0.10); stroke: rgba(26,109,255,0.22); stroke-width: 2; }
      .green { fill: rgba(0,163,138,0.10); stroke: rgba(0,163,138,0.24); stroke-width: 2; }
      .amber { fill: rgba(234,153,0,0.12); stroke: rgba(234,153,0,0.24); stroke-width: 2; }
      .line { stroke: #c5d4e6; stroke-width: 5; stroke-linecap: round; }
      .arrow { fill: #8aa0b8; }
    </style>
  </defs>
  <rect width="1200" height="1500" rx="0" fill="url(#bg)"/>
  <circle cx="1070" cy="90" r="170" fill="#dcecff" opacity="0.72"/>
  <circle cx="90" cy="1380" r="210" fill="#dcfff7" opacity="0.72"/>

  <g filter="url(#shadow)">
    <rect x="78" y="72" width="1044" height="1356" rx="54" fill="#ffffff"/>
  </g>

  <rect x="78" y="72" width="1044" height="288" rx="54" fill="url(#hero)"/>
  <text x="130" y="154" class="sans eyebrow white">OMH skill</text>
  <text x="130" y="246" class="sans title white">visual-summary</text>
  <text x="132" y="308" class="sans subtitle white">Readable image-card prompts for Hermes workflows</text>

  <g transform="translate(130 424)">
    <rect class="pill" x="0" y="0" width="940" height="104" rx="28"/>
    <text x="34" y="43" class="sans label">Use it when Hermes should shape:</text>
    <text x="34" y="79" class="sans small">meeting notes · PR reviews · issue triage · research briefings · release notes</text>
  </g>

  <g transform="translate(130 594)">
    <rect class="card" x="0" y="0" width="262" height="150" rx="26"/>
    <text x="30" y="50" class="sans label">Source</text>
    <text x="30" y="91" class="sans small">notes, PR, issue,</text>
    <text x="30" y="122" class="sans small">research, release</text>

    <line class="line" x1="284" y1="75" x2="360" y2="75"/>
    <polygon class="arrow" points="360,75 338,60 338,90"/>

    <rect class="card" x="382" y="0" width="262" height="150" rx="26"/>
    <text x="412" y="50" class="mono code">visual_prompt</text>
    <text x="412" y="91" class="mono code">_card/v1</text>
    <text x="412" y="124" class="sans small">prepared only</text>

    <line class="line" x1="666" y1="75" x2="742" y2="75"/>
    <polygon class="arrow" points="742,75 720,60 720,90"/>

    <rect class="card" x="764" y="0" width="176" height="150" rx="26"/>
    <text x="794" y="50" class="sans label">Image tool</text>
    <text x="794" y="91" class="sans small">wrapper-owned</text>
    <text x="794" y="122" class="sans small">if connected</text>
  </g>

  <g transform="translate(130 814)">
    <rect class="green" x="0" y="0" width="440" height="246" rx="30"/>
    <text x="34" y="52" class="sans label">Prepared by OMH</text>
    <text x="34" y="100" class="sans body">• card copy and layout</text>
    <text x="34" y="143" class="sans body">• language and audience</text>
    <text x="34" y="186" class="sans body">• generation prompt</text>
    <text x="34" y="226" class="sans body">• visual QA checklist</text>

    <rect class="amber" x="500" y="0" width="440" height="246" rx="30"/>
    <text x="534" y="52" class="sans label">Observed later</text>
    <text x="534" y="100" class="sans body">• generated image</text>
    <text x="534" y="143" class="sans body">• visual QA passed</text>
    <text x="534" y="186" class="sans body">• attached or delivered</text>
    <text x="534" y="226" class="sans body">• recorded evidence</text>
  </g>

  <g transform="translate(130 1120)">
    <rect x="0" y="0" width="940" height="164" rx="30" fill="#102033"/>
    <text x="34" y="54" class="sans label white">Boundary that makes the workflow safe</text>
    <text x="34" y="100" class="sans body white">No hidden image provider calls. No fake QA. No fake delivery.</text>
    <text x="34" y="139" class="sans small" fill="#c9d8ea">A prompt card is useful preparation, not proof that an image exists.</text>
  </g>

  <text x="130" y="1358" class="mono code">omh visual prompt-card --kind pr --headline "PR Review Card"</text>
</svg>
